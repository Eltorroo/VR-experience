<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>VR Kas Experience</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

    <style>
        body {
            margin: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
                         Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #0b1723;
            color: #ffffff;
        }

        #mode-selector button {
            background-color: #0b7c58;
            color: #ffffff;
            border: none;
            padding: 8px 14px;
            margin-right: 8px;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
        }

        #mode-selector button.active {
            background-color: #095b42;
        }

        #mode-selector button:hover {
            background-color: #12a06f;
        }
    </style>

    <script>
        // --- A-FRAME COMPONENT: KAS EXPERIENCE ---
        AFRAME.registerComponent('kas-experience', {
            init: function () {
                // Game State inclusief score
                this.gameState = {
                    currentScene: 'scene0',
                    score: 0,
                    maxScore: 100
                };

                // Functies om de score bij te houden
                const voegPuntenToe = (punten) => { this.gameState.score += punten; };

                // Scenes Configuratie
                this.scenesConfig = {
                    'scene0': {
                        type: 'intro',
                        text: 'Welkom bij de kastechniek-experience.\nKlik op START om te beginnen.',
                        mediaType: 'image', media: '#intro-bg',
                        choices: [
                            { text: 'START', next: 'video1' }
                        ]
                    },

                    // --- DEEL 1 ---
                    'video1': {
                        type: 'video', text: 'Elk project begint met een zorgvuldige planning door onze engineers...',
                        mediaType: 'video', media: '#actie-video', choices: [], onVideoEnd: 'vraag1'
                    },
                    'vraag1': {
                        type: 'vraag', text: 'Vraag 1: Elke kas is hetzelfde, engineers kopieren en plakken.\nWat denk jij?',
                        mediaType: 'image', media: '#img-vraag1',
                        choices: [
                            { text: 'Ja, een kas is gewoon staal, aluminium en glas', next: 'video2', action: () => voegPuntenToe(0) },
                            { text: 'Nee, elke teelt, locatie en klant hebben andere eisen', next: 'video2', action: () => voegPuntenToe(15) }, // CORRECT (15 pt)
                            { text: 'Ja, alleen de planten die erin staan verschillen', next: 'video2', action: () => voegPuntenToe(0) }
                        ]
                    },

                    // --- DEEL 2 ---
                    'video2': {
                        type: 'video', text: 'Onze verkoper maakt afspraken met de klant, elke tuinder heeft eigen wensen.',
                        mediaType: 'video', media: '#tweede-video', choices: [], onVideoEnd: 'vraag2'
                    },
                    'vraag2': {
                        type: 'vraag', text: 'Vraag 2: De klant heeft duidelijke verwachtingen en eisen.\nWat gebeurt er met deze info?',
                        mediaType: 'image', media: '#img-vraag2',
                        choices: [
                            { text: 'Dit gaat het ene oor in en andere oor eruit', next: 'video3', action: () => voegPuntenToe(0) },
                            { text: 'Dit sturen we door naar een extern bedrijf dat alles voor ons maakt', next: 'video3', action: () => voegPuntenToe(0) },
                            { text: 'Dit gaat naar onze fabriek, waar alles op maat gemaakt wordt', next: 'video3', action: () => voegPuntenToe(15) } // CORRECT (15 pt)
                        ]
                    },

                    // --- DEEL 3 ---
                    'video3': {
                        type: 'video', text: 'De info wordt door engineers omgezet naar tekeningen voor de fabriek.',
                        mediaType: 'video', media: '#derde-video', choices: [], onVideoEnd: 'vraag3'
                    },
                    'vraag3': {
                        type: 'vraag', text: 'Vraag 3: Je staat in de fabriek en denkt dat een engineer een tekenfout heeft gemaakt.\nWat doe je?',
                        mediaType: 'image', media: '#img-vraag3',
                        choices: [
                            { text: 'Ik meld dit netjes bij de engineer of chef om het aan te passen', next: 'video4', action: () => voegPuntenToe(20) }, // CORRECT (20 pt)
                            { text: 'De engineers maken geen fouten, ik negeer het en zeg niks', next: 'video4', action: () => voegPuntenToe(0) },
                            { text: 'Ik probeer het direct zelf op te lossen zonder overleg', next: 'video4', action: () => voegPuntenToe(0) }
                        ]
                    },

                    // --- DEEL 4 ---
                    'video4': {
                        type: 'video', text: 'Kijk mee naar de opbouw...',
                        mediaType: 'video', media: '#vierde-video', choices: [], onVideoEnd: 'vraag4'
                    },
                    'vraag4': {
                        type: 'vraag', text: 'Vraag 4: De kas wordt opgebouwd, wat is tijdens deze fase het belangrijkst?',
                        mediaType: 'image', media: '#img-vraag4',
                        choices: [
                            { text: 'Zoveel mogelijk materiaal besparen', next: 'video5', action: () => voegPuntenToe(0) },
                            { text: 'Snel en hard doorwerken, projecten hebben een deadline', next: 'video5', action: () => voegPuntenToe(0) },
                            { text: 'Zorgvuldig en veilig werken', next: 'video5', action: () => voegPuntenToe(25) } // CORRECT (25 pt)
                        ]
                    },

                    // --- DEEL 5 ---
                    'video5': {
                        type: 'video', text: 'De bouw nadert zijn einde...',
                        mediaType: 'video', media: '#vijfde-video', choices: [], onVideoEnd: 'vraag5'
                    },
                    'vraag5': {
                        type: 'vraag', text: 'Vraag 5: De kasconstructie is klaar\nWie was er het belangrijkst in dit proces?',
                        mediaType: 'image', media: '#img-vraag5',
                        choices: [
                            { text: 'De verkoper en de klant', next: 'einde', action: () => voegPuntenToe(0) },
                            // Hier is de ' in collega's gefixt met een backslash er voor!
                            { text: 'Alle collega\'s die betrokken zijn geweest', next: 'einde', action: () => voegPuntenToe(25) }, // CORRECT (25 pt)
                            { text: 'De monteurs in het veld, die de kas hebben opgebouwd', next: 'einde', action: () => voegPuntenToe(0) }
                        ]
                    },

                    // --- EINDE (Scorescherm) ---
                    'einde': {
                        type: 'einde',
                        text: () => {
                            const score = this.gameState.score;
                            let beoordeling = '';
                            
                            // Logica voor de beoordelingstekst
                            if (score === 100) beoordeling = 'Uitmuntend! Je hebt een perfect inzicht in onze processen.';
                            else if (score >= 70) beoordeling = 'Goed gedaan! Je hebt de belangrijkste zaken goed op orde.';
                            else if (score >= 40) beoordeling = 'Matig. Je hebt de basis door, maar er is ruimte voor verbetering.';
                            else beoordeling = 'Onvoldoende. Let in de toekomst beter op de veiligheid en samenwerking.';
                            
                            return `Einde van de experience!\n\nJouw score: ${score} van de 100 punten.\n\n${beoordeling}`;
                        },
                        mediaType: 'image', media: '#intro-bg',
                        choices: [
                            { text: 'OPNIEUW SPELEN', next: 'scene0', action: () => { this.gameState.score = 0; } }
                        ]
                    }
                };

                // DOM Referenties ophalen
                this.elText = document.getElementById('question-text');
                this.elImage = document.getElementById('image-display');
                this.elVideo = document.getElementById('video-display');
                this.btnEntities = [
                    document.getElementById('btn-0'),
                    document.getElementById('btn-1'),
                    document.getElementById('btn-2')
                ];
                this.btnPlanes = [
                    document.getElementById('btn-plane-0'),
                    document.getElementById('btn-plane-1'),
                    document.getElementById('btn-plane-2')
                ];
                this.btnTexts = [
                    document.getElementById('btn-text-0'),
                    document.getElementById('btn-text-1'),
                    document.getElementById('btn-text-2')
                ];

                this.btnPlanes.forEach((plane, index) => {
                    plane.addEventListener('click', () => {
                        this.handleChoice(index);
                    });
                });

                document.body.addEventListener('click', () => {
                    document.querySelectorAll('video').forEach(v => {
                        if (v.paused) {
                            v.muted = true;
                            v.play().then(() => v.pause()).catch(() => {});
                        }
                    });
                }, { once: true });

                this.goToScene('scene0');
            },

            handleChoice: function(index) {
                const sceneData = this.scenesConfig[this.gameState.currentScene];
                const choicesArray = typeof sceneData.choices === 'function' ? sceneData.choices() : (sceneData.choices || []);
                const choice = choicesArray[index];

                if (!choice) return;

                const plane = this.btnPlanes[index];
                plane.setAttribute('color', '#12a06f'); 

                if (choice.action) choice.action();

                setTimeout(() => {
                    this.goToScene(choice.next);
                }, 400);
            },

            goToScene: function (sceneId) {
                this.gameState.currentScene = sceneId;
                const sceneData = this.scenesConfig[sceneId];

                const textValue = typeof sceneData.text === 'function' ? sceneData.text() : sceneData.text;
                this.elText.setAttribute('value', textValue);

                document.querySelectorAll('video').forEach(vid => {
                    vid.pause();
                    vid.currentTime = 0;
                    vid.onended = null;
                });

                if (sceneData.mediaType === 'video') {
                    this.elImage.setAttribute('visible', 'false');
                    this.elVideo.setAttribute('visible', 'true');
                    this.elVideo.setAttribute('src', sceneData.media);

                    setTimeout(() => {
                        const videoAsset = document.querySelector(sceneData.media);
                        if (videoAsset) {
                            const p = videoAsset.play();
                            if (p !== undefined) {
                                p.catch(err => console.log('Video play error:', err));
                            }
                            videoAsset.onended = () => {
                                if (sceneData.onVideoEnd) this.goToScene(sceneData.onVideoEnd);
                            };
                        }
                    }, 100);
                } else {
                    this.elVideo.setAttribute('visible', 'false');
                    
                    if (sceneData.media) {
                        const imgEl = document.querySelector(sceneData.media);
                        
                        const applyImageFit = () => {
                            let nw = imgEl.naturalWidth || 800; 
                            let nh = imgEl.naturalHeight || 600; 
                            let aspect = nw / nh;
                            
                            let maxHeight = 2.5;
                            let maxWidth = 6.0;
                            
                            let calcHeight = maxHeight;
                            let calcWidth = calcHeight * aspect;
                            
                            if (calcWidth > maxWidth) {
                                calcWidth = maxWidth;
                                calcHeight = calcWidth / aspect;
                            }
                            
                            this.elImage.setAttribute('width', calcWidth);
                            this.elImage.setAttribute('height', calcHeight);
                            this.elImage.setAttribute('src', sceneData.media);
                            this.elImage.setAttribute('visible', 'true');
                        };

                        if (imgEl && imgEl.complete) {
                            applyImageFit();
                        } else if (imgEl) {
                            imgEl.onload = applyImageFit;
                        } else {
                            this.elImage.setAttribute('src', sceneData.media);
                            this.elImage.setAttribute('visible', 'true');
                        }
                    } else {
                        this.elImage.setAttribute('visible', 'false');
                    }
                }

                const choicesArray = typeof sceneData.choices === 'function' ? sceneData.choices() : (sceneData.choices || []);
                const isVraag = choicesArray.length === 3;

                this.btnEntities.forEach((btnEntity, index) => {
                    const plane = this.btnPlanes[index];
                    const textEl = this.btnTexts[index];

                    if (index < choicesArray.length) {
                        const choice = choicesArray[index];
                        
                        let y = 0, width = 1.5, height = 0.5;
                        
                        // Layout voor start/eind knoppen vs 3-keuze vragen
                        if (this.gameState.currentScene === 'scene0') {
                            y = -0.5 - (index * 0.9); // Knop 1 en 2 onder elkaar
                            width = 3.5; height = 0.7;
                        } else if (this.gameState.currentScene === 'einde') {
                            y = -1.0; width = 2.4; height = 0.8;
                        } else if (isVraag) {
                            const startY = -1.2; 
                            const rowSpacing = 0.65;
                            y = startY - (index * rowSpacing);
                            width = 4.2; height = 0.5;
                        }

                        btnEntity.setAttribute('position', `0 ${y} 0.02`);
                        btnEntity.setAttribute('visible', 'true');
                        
                        let baseColor = (this.gameState.currentScene === 'einde') ? '#f5a623' : '#0b7c58';
                        let hoverColor = (this.gameState.currentScene === 'einde') ? '#f8bf4a' : '#12a06f';

                        plane.setAttribute('width', width);
                        plane.setAttribute('height', height);
                        plane.setAttribute('color', baseColor);
                        plane.setAttribute('animation__hover', `property: color; to: ${hoverColor}; startEvents: mouseenter; dur: 200`);
                        plane.setAttribute('animation__leave', `property: color; to: ${baseColor}; startEvents: mouseleave; dur: 200`);
                        plane.classList.add('clickable');

                        textEl.setAttribute('value', choice.text);
                        textEl.setAttribute('width', width * 0.9);
                        textEl.setAttribute('wrap-count', isVraag ? '45' : '30');

                    } else {
                        btnEntity.setAttribute('visible', 'false');
                        plane.classList.remove('clickable'); 
                    }
                });
            }
        });
    </script>
</head>
<body>
    <div id="mode-selector" style="position: fixed; top: 10px; left: 10px; z-index: 9999;">
        <button id="normalModeBtn">Normaal scherm</button>
        <button id="vrModeBtn">VR bril / Passthrough</button>
    </div>

<div style="position: fixed; top: 10px; right: 10px; z-index: 9999; background: #0b1723; padding: 12px; border-radius: 6px; border: 2px solid #0b7c58;">
        <div style="margin-bottom: 8px; font-weight: bold; font-size: 14px;">Achtergrond:</div>
        <label style="cursor: pointer; display: block; margin-bottom: 5px;">
            <input type="radio" name="bgMode" checked onchange="document.getElementById('bg-sky').setAttribute('visible', 'false')"> 
            AR (Doorzichtig)
        </label>
        <label style="cursor: pointer; display: block;">
            <input type="radio" name="bgMode" onchange="document.getElementById('bg-sky').setAttribute('visible', 'true')"> 
            VR (Zwarte bioscoop)
        </label>
    </div>
    
    <a-scene kas-experience transparent="true" webxr="optionalFeatures: dom-overlay, hit-test; referenceSpaceType: local-floor" device-orientation-permission-ui="enabled: true">

        <a-sky id="bg-sky" color="#111" visible="false"></a-sky>

        <a-assets>
            <img id="intro-bg" src="startpagina.png" crossorigin="anonymous">

            <img id="img-vraag1" src="plattegrond.png" crossorigin="anonymous">
            <img id="img-vraag2" src="waterruimte.png" crossorigin="anonymous">
            <img id="img-vraag3" src="fabriek.png" crossorigin="anonymous">
            <img id="img-vraag4" src="bouw.png" crossorigin="anonymous">
            <img id="img-vraag5" src="klaar.png" crossorigin="anonymous">

            <video id="actie-video" src="intro.mp4" playsinline webkit-playsinline crossorigin="anonymous"></video>
            <video id="tweede-video" src="tweede.mp4" playsinline webkit-playsinline crossorigin="anonymous"></video>
            <video id="derde-video" src="derde.mp4" playsinline webkit-playsinline crossorigin="anonymous"></video>
            <video id="vierde-video" src="vierde.mp4" playsinline webkit-playsinline crossorigin="anonymous"></video>
            <video id="vijfde-video" src="vijfde.mp4" playsinline webkit-playsinline crossorigin="anonymous"></video>
        </a-assets>

        <a-entity camera look-controls position="0 1.6 0">
            <a-entity cursor="fuse: true; fuseTimeout: 1500"
                      raycaster="objects: .clickable"
                      position="0 0 -1"
                      geometry="primitive: ring; radiusInner: 0.02; radiusOuter: 0.03"
                      material="color: white; shader: flat"
                      animation__fusing="property: scale; to: 0.2 0.2 0.2; startEvents: fusing; dur: 1500; easing: easeInCubic"
                      animation__click="property: scale; to: 1 1 1; startEvents: click; dur: 150; easing: easeInCubic"
                      animation__leave="property: scale; to: 1 1 1; startEvents: mouseleave; dur: 150">
            </a-entity>
        </a-entity>

        <a-entity laser-controls="hand: left" raycaster="objects: .clickable"></a-entity>
        <a-entity laser-controls="hand: right" raycaster="objects: .clickable"></a-entity>

        <a-entity id="ui-container" position="0 1.5 -3">
            
            <a-text id="question-text" value="Laden..." align="center"
                    position="0 2.2 0" width="4.5" wrap-count="45"
                    color="#f5f7fa"></a-text>

            <a-image id="image-display" position="0 0.5 0" visible="false"></a-image>

            <a-video id="video-display" position="0 0.4 0" width="5" height="2.5" visible="false"></a-video>

            <a-entity id="choices-container" position="0 0 0">
                
                <a-entity id="btn-0" visible="false">
                    <a-plane id="btn-plane-0" position="0 0 0" material="shader: flat;"></a-plane>
                    <a-text id="btn-text-0" position="0 0 0.01" align="center" color="#FFF"></a-text>
                </a-entity>

                <a-entity id="btn-1" visible="false">
                    <a-plane id="btn-plane-1" position="0 0 0" material="shader: flat;"></a-plane>
                    <a-text id="btn-text-1" position="0 0 0.01" align="center" color="#FFF"></a-text>
                </a-entity>

                <a-entity id="btn-2" visible="false">
                    <a-plane id="btn-plane-2" position="0 0 0" material="shader: flat;"></a-plane>
                    <a-text id="btn-text-2" position="0 0 0.01" align="center" color="#FFF"></a-text>
                </a-entity>

            </a-entity>
        </a-entity>

    </a-scene>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const normalBtn = document.getElementById('normalModeBtn');
            const vrBtn = document.getElementById('vrModeBtn');

            if (!normalBtn || !vrBtn) return;

            normalBtn.classList.add('active');

            normalBtn.addEventListener('click', function () {
                const sceneEl = document.querySelector('a-scene');
                if (sceneEl && sceneEl.is && sceneEl.is('vr-mode')) {
                    sceneEl.exitVR();
                }
                normalBtn.classList.add('active');
                vrBtn.classList.remove('active');
            });

            vrBtn.addEventListener('click', function () {
                const sceneEl = document.querySelector('a-scene');
                if (sceneEl && sceneEl.hasLoaded) {
                     if (sceneEl.systems.webxr.sceneEl.is('ar-mode')) {
                         sceneEl.enterVR(); 
                     } else {
                         sceneEl.systems.webxr.sessionReferenceSpaceType = 'local-floor';
                         sceneEl.enterAR(); 
                     }
                }
                normalBtn.classList.remove('active');
                vrBtn.classList.add('active');
            });
            
            const sceneEl = document.querySelector('a-scene');
            sceneEl.addEventListener('enter-vr', function () {
                normalBtn.classList.remove('active');
                vrBtn.classList.add('active');
            });
            sceneEl.addEventListener('exit-vr', function () {
                normalBtn.classList.add('active');
                vrBtn.classList.remove('active');
            });
        });
    </script>
</body>
</html>
