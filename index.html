<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>VR Kas Experience</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

    <style>
        body {
            margin: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
                         Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #0b1723;
            color: #ffffff;
        }

        /* UI Overlay Styles */
        .ui-overlay {
            position: fixed;
            z-index: 9999;
        }

        #mode-selector {
            top: 10px;
            left: 10px;
        }

        .btn-ui {
            background-color: #0b7c58;
            color: #ffffff;
            border: none;
            padding: 8px 14px;
            margin-right: 8px;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
        }

        .btn-ui.active {
            background-color: #095b42;
        }

        .btn-ui:hover {
            background-color: #12a06f;
        }

        #bg-selector {
            top: 10px;
            right: 10px;
            background: #0b1723;
            padding: 12px;
            border-radius: 6px;
            border: 2px solid #0b7c58;
        }

        .bg-option {
            cursor: pointer;
            display: block;
            margin-bottom: 5px;
        }
        
        .bg-label {
            margin-bottom: 8px;
            font-weight: bold;
            font-size: 14px;
        }
    </style>

    <script>
        // --- A-FRAME COMPONENT: KAS EXPERIENCE ---
        AFRAME.registerComponent('kas-experience', {
            init: function () {
                // Game State inclusief score
                this.gameState = {
                    currentScene: 'scene0',
                    score: 0,
                    maxScore: 135 // Totaal van 15+15+15+20+20+10+15+25
                };

                // Functies om de score bij te houden
                const voegPuntenToe = (punten) => { this.gameState.score += punten; };

                // Scenes Configuratie
                this.scenesConfig = {
                    'scene0': {
                        type: 'intro',
                        text: 'Welkom bij de kastechniek-experience.\nKlik op START om te beginnen.',
                        mediaType: 'image', media: '#intro-bg',
                        choices: [
                            { text: 'START', next: 'video1' }
                        ]
                    },

                    // --- DEEL 1 ---
                    'video1': {
                        type: 'video', text: 'Elk project begint met klantcontact en een doordachte engineering op het gebied van constructie en klimaat.',
                        mediaType: 'video', media: '#actie-video', choices: [], onVideoEnd: 'vraag1'
                    },
                    'vraag1': {
                        type: 'vraag', text: 'We hebben een nieuwe projectaanvraag voor een kas in Kazachstan.\n\nWaar moet jij als constructie-engineer vooral op letten?',
                        mediaType: 'image', media: '#img-vraag1',
                        choices: [
                            { text: 'Klimaatomstandigheden (wind-, sneeuw en temperatuurbelasting)', next: 'vraag1b', action: () => voegPuntenToe(0) },
                            { text: 'Constructieve eisen (overspanning, kashoogte en stabiliteit)', next: 'vraag1b', action: () => voegPuntenToe(0) },
                            { text: 'Locatie en regelgeving (bouwcodes, milieu- en vergunningseisen)', next: 'vraag1b', action: () => voegPuntenToe(0) },
                            { text: 'Al het bovenstaande', next: 'vraag1b', action: () => voegPuntenToe(15) } // CORRECT (15 pt)
                        ]
                    },
                    'vraag1b': {
                        type: 'vraag', text: 'Voor een duurzame orchideeënkas verzorgen we het klimaat en de automatisering.\n\nWat maakt rendabele fossielvrije teelt mogelijk?',
                        mediaType: 'image', media: '#img-vraag1b',
                        choices: [
                            { text: 'Aquathermie en industriële warmtepompen ', next: 'video2', action: () => voegPuntenToe(0) },
                            { text: 'E-boilers met actieve luchtbehandeling (ontvochtiging)', next: 'video2', action: () => voegPuntenToe(0) },
                            { text: 'Diepe ondergrondse warmte/koude seizoensopslag', next: 'video2', action: () => voegPuntenToe(0) },
                            { text: 'Een doordachte combinatie van de hierboven benoemde systemen', next: 'video2', action: () => voegPuntenToe(15) } // Pas hier eventueel de te behalen punten aan
                        ]
                    },

                    // --- DEEL 2 ---
                    'video2': {
                        type: 'video', text: 'Onze verkoper maakt afspraken met de klant, elke tuinder heeft specifieke wensen.',
                        mediaType: 'video', media: '#tweede-video', choices: [], onVideoEnd: 'vraag2'
                    },
                    'vraag2': {
                        type: 'vraag', text: 'Het verkoopteam doet er alles aan om een goede deal te sluiten.\nWat is het allerbelangrijkste tijdens dit proces?',
                        mediaType: 'image', media: '#img-vraag2',
                        choices: [
                            { text: 'Het optimaliseren van de winst, ten kosten van andere factoren', next: 'video3', action: () => voegPuntenToe(0) },
                            { text: 'Alles beloven wat de klant in zijn kas wil hebben', next: 'video3', action: () => voegPuntenToe(0) },
                            { text: 'Intensief communiceren met de klant en met onze eigen engineers, zodat de oplossing technisch klopt en zowel klant als leverancier winnen', next: 'video3', action: () => voegPuntenToe(15) } // CORRECT (15 pt)
                        ]
                    },

                    // --- DEEL 3 ---
                    'video3': {
                        type: 'video', text: 'Onze lassers maken de tekeningen nauwkeurig na, daarnaast is er ook veel geautomatiseerd. De tekeningen die jij maakt, worden in de fabriek achter het kantoor omgezet naar realiteit. ',
                        mediaType: 'video', media: '#derde-video', choices: [], onVideoEnd: 'vraag3'
                    },
                    'vraag3': {
                        type: 'vraag', text: 'Er wordt bij ons veel gelast aan staalconstructie, verwarmingsbuizen en gasleidingen.\nWelk lasproces wordt voor staalconstructie en gasleidingen ingezet?',
                        mediaType: 'image', media: '#img-vraag3',
                        choices: [
                            { text: 'BmBe en TIG lassen', next: 'video4', action: () => voegPuntenToe(0) },
                            { text: 'MAG en TIG lassen', next: 'video4', action: () => voegPuntenToe(20) },
                            { text: 'OP en MAG lassen', next: 'video4', action: () => voegPuntenToe(0) }
                        ]
                    },

                    // --- DEEL 4 ---
                    'video4': {
                        type: 'video', text: 'Kijk mee bij een nieuwbouwproject.',
                        mediaType: 'video', media: '#vierde-video', choices: [], onVideoEnd: 'vraag4'
                    },
                    'vraag4': {
                        type: 'vraag', text: 'Momenteel loopt er een groot nieuwbouwproject van 12 hectare kas in Oostenrijk. Maurice Kassenbouw en Cogas mogen vanaf het begin tot het einde alles ontwerpen, produceren/inkopen en assembleren op locatie. \nHoeveel vrachtwagens denk jij dat de komende maanden naar Oostenrijk gaan voor dit project? ',
                        mediaType: 'image', media: '#img-vraag4-heftruck',
                        choices: [
                            { text: 'Tussen de 25 en 75', next: 'vraag4b', action: () => voegPuntenToe(0) },
                            { text: 'Tussen de 75 en 150', next: 'vraag4b', action: () => voegPuntenToe(0) },
                             { text: 'Tussen de 150 en 225', next: 'vraag4b', action: () => voegPuntenToe(0) },
                            { text: 'Meer dan 225', next: 'vraag4b', action: () => voegPuntenToe(20) } // CORRECT (20 pt)
                        ]
                    },
                    'vraag4b': {
                        type: 'vraag', text: 'De komende maanden zullen wij ongeveer 250 vrachtwagens versturen naar Oostenrijk. Dit vereist een nauwkeurige planning, alles moet in Nederland voorbereid en ingeladen worden, en in Oostenrijk weer uitgeladen.\n\nWat is cruciaal voor een succesvolle transport coördinatie?',
                        mediaType: 'image', media: '#img-vraag4b-vrachtwagen',
                        choices: [
                            { text: 'Al het materiaal moet zo snel mogelijk naar de bouwplaats toe. Als er iemand wat nodig heeft, dan is het materiaal altijd aanwezig.', next: 'vraag4c', action: () => voegPuntenToe(0) },
                            { text: 'Een strakke planning met duidelijke communicatie naar alle stakeholders. Materiaal wordt verstuurd wanneer het binnenkort nodig is op de bouw, i.v.m. een efficiënte ruimtelijke indeling op de bouwplaats.', next: 'vraag4c', action: () => voegPuntenToe(10) }, // CORRECT (10 pt)
                            { text: 'De planning is flexibel en ik ben zelf goed op de hoogte van het geplande transport de komende dagen, de mensen die op de bouw aanwezig zijn helpen met uitladen wanneer het aankomt.', next: 'vraag4c', action: () => voegPuntenToe(0) }
                        ]
                    },
                    'vraag4c': {
                        type: 'vraag', text: 'Wat zijn de hoofdmaterialen bij het bouwen van een kas? En in welke volgorde worden de materialen bij een nieuwbouwproject toegepast?',
                        mediaType: 'image', media: '#img-vraag4', // Deze vraag gebruikt nu bouw.png
                        choices: [
                            { text: 'Beton, staal, glas en plastic', next: 'video5', action: () => voegPuntenToe(0) },
                            { text: 'Steen, aluminium, staal en glas', next: 'video5', action: () => voegPuntenToe(0) },
                             { text: 'Beton, staal, aluminium en glas. ', next: 'video5', action: () => voegPuntenToe(0) },
                            { text: 'Beton, staal, glas en aluminium', next: 'video5', action: () => voegPuntenToe(15) } // CORRECT (15 pt)
                        ]
                    },

                    // --- DEEL 5 ---
                    'video5': {
                        type: 'video', text: 'De bouw nadert zijn einde...',
                        mediaType: 'video', media: '#vijfde-video', choices: [], onVideoEnd: 'vraag5'
                    },
                    'vraag5': {
                        type: 'vraag', text: 'Vraag 5: De kasconstructie is klaar\nWie was er het belangrijkst in dit proces?',
                        mediaType: 'image', media: '#img-vraag5',
                        choices: [
                            { text: 'De verkoper en de klant', next: 'einde', action: () => voegPuntenToe(0) },
                            // Hier is de ' in collega's gefixt met een backslash er voor!
                            { text: 'Alle collega\'s die betrokken zijn geweest', next: 'einde', action: () => voegPuntenToe(25) }, // CORRECT (25 pt)
                            { text: 'De monteurs in het veld, die de kas hebben opgebouwd', next: 'einde', action: () => voegPuntenToe(0) }
                        ]
                    },

                    // --- EINDE (Scorescherm) ---
                    'einde': {
                        type: 'einde',
                        text: () => {
                            const score = this.gameState.score;
                            let beoordeling = '';
                            
                            // Logica voor de beoordelingstekst (max score is 135)
                            if (score === 135) beoordeling = 'Uitmuntend! Je hebt een perfect inzicht in onze processen.';
                            else if (score >= 100) beoordeling = 'Goed gedaan! Je hebt de belangrijkste zaken goed op orde.';
                            else if (score >= 65) beoordeling = 'Matig. Je hebt de basis door, maar er is ruimte voor verbetering.';
                            else beoordeling = 'Onvoldoende. Let in de toekomst beter op de veiligheid en samenwerking.';
                            
                            return `Einde van de experience!\n\nJouw score: ${score} van de ${this.gameState.maxScore} punten.\n\n${beoordeling}`;
                        },
                        mediaType: 'image', media: '#intro-bg',
                        choices: [
                            { text: 'OPNIEUW SPELEN', next: 'scene0', action: () => { this.gameState.score = 0; } }
                        ]
                    }
                };

                // DOM Referenties ophalen
                this.elText = document.getElementById('question-text');
                this.elImage = document.getElementById('image-display');
                this.elVideo = document.getElementById('video-display');
                this.btnEntities = [
                    document.getElementById('btn-0'),
                    document.getElementById('btn-1'),
                    document.getElementById('btn-2'),
                    document.getElementById('btn-3')
                ];
                this.btnPlanes = [
                    document.getElementById('btn-plane-0'),
                    document.getElementById('btn-plane-1'),
                    document.getElementById('btn-plane-2'),
                    document.getElementById('btn-plane-3')
                ];
                this.btnTexts = [
                    document.getElementById('btn-text-0'),
                    document.getElementById('btn-text-1'),
                    document.getElementById('btn-text-2'),
                    document.getElementById('btn-text-3')
                ];

                this.btnPlanes.forEach((plane, index) => {
                    plane.addEventListener('click', () => {
                        if (!plane.classList.contains('clickable')) return;
                        this.handleChoice(index);
                    });
                });

                document.body.addEventListener('click', () => {
                    document.querySelectorAll('video').forEach(v => {
                        if (v.paused && v.id !== 'bg-360') { 
                            v.muted = false; // Normale video's mogen geluid maken
                            v.play().then(() => v.pause()).catch(() => {});
                        }
                    });
                }, { once: true });

                this.goToScene('scene0');
            },

            handleChoice: function(index) {
                const sceneData = this.scenesConfig[this.gameState.currentScene];
                const choicesArray = typeof sceneData.choices === 'function' ? sceneData.choices() : (sceneData.choices || []);
                const choice = choicesArray[index];

                if (!choice) return;

                const plane = this.btnPlanes[index];
                plane.setAttribute('color', '#12a06f'); 

                if (choice.action) choice.action();

                setTimeout(() => {
                    this.goToScene(choice.next);
                }, 400);
            },

            goToScene: function (sceneId) {
                this.gameState.currentScene = sceneId;
                const sceneData = this.scenesConfig[sceneId];

                const textValue = typeof sceneData.text === 'function' ? sceneData.text() : sceneData.text;
                this.elText.setAttribute('value', textValue);

                document.querySelectorAll('video').forEach(vid => {
                    if (vid.id !== 'bg-360') { // Sluit de 360-achtergrond uit!
                        vid.pause();
                        vid.currentTime = 0;
                        vid.onended = null;
                    }
                });

                if (sceneData.mediaType === 'video') {
                    this.elImage.setAttribute('visible', 'false');
                    this.elVideo.setAttribute('visible', 'true');
                    this.elVideo.setAttribute('src', sceneData.media);

                    setTimeout(() => {
                        const videoAsset = document.querySelector(sceneData.media);
                        if (videoAsset) {
                            const p = videoAsset.play();
                            if (p !== undefined) {
                                p.catch(err => console.log('Video play error:', err));
                            }
                            videoAsset.onended = () => {
                                if (sceneData.onVideoEnd) this.goToScene(sceneData.onVideoEnd);
                            };
                        }
                    }, 100);
                } else {
                    this.elVideo.setAttribute('visible', 'false');
                    
                    if (sceneData.media) {
                        const imgEl = document.querySelector(sceneData.media);
                        
                        const applyImageFit = () => {
                            let nw = imgEl.naturalWidth || 800; 
                            let nh = imgEl.naturalHeight || 600; 
                            let aspect = nw / nh;
                            
                            let maxHeight = 2.5;
                            let maxWidth = 6.0;
                            
                            let calcHeight = maxHeight;
                            let calcWidth = calcHeight * aspect;
                            
                            if (calcWidth > maxWidth) {
                                calcWidth = maxWidth;
                                calcHeight = calcWidth / aspect;
                            }
                            
                            this.elImage.setAttribute('width', calcWidth);
                            this.elImage.setAttribute('height', calcHeight);
                            this.elImage.setAttribute('src', sceneData.media);
                            this.elImage.setAttribute('visible', 'true');
                        };

                        if (imgEl && imgEl.complete) {
                            applyImageFit();
                        } else if (imgEl) {
                            imgEl.onload = applyImageFit;
                        } else {
                            this.elImage.setAttribute('src', sceneData.media);
                            this.elImage.setAttribute('visible', 'true');
                        }
                    } else {
                        this.elImage.setAttribute('visible', 'false');
                    }
                }

                const choicesArray = typeof sceneData.choices === 'function' ? sceneData.choices() : (sceneData.choices || []);
                const isQuestionScene = choicesArray.length > 1 && this.gameState.currentScene !== 'scene0' && this.gameState.currentScene !== 'einde';

                this.btnEntities.forEach((btnEntity, index) => {
                    const plane = this.btnPlanes[index];
                    const textEl = this.btnTexts[index];

                    if (index < choicesArray.length) {
                        btnEntity.setAttribute('visible', 'true');
                        plane.classList.add('clickable');

                        const choice = choicesArray[index];
                        let y, width, height, wrapCount;
                        
                        // Layout voor start/eind knoppen vs 3-keuze vragen
                        if (this.gameState.currentScene === 'scene0') {
                            y = -0.5 - (index * 0.9); // Knop 1 en 2 onder elkaar
                            width = 3.5; height = 0.7;
                            wrapCount = 30;
                        } else if (this.gameState.currentScene === 'einde') {
                            y = -1.0; width = 2.4; height = 0.8;
                            wrapCount = 30;
                        } else if (isQuestionScene) {
                            width = 5.5; 
                            wrapCount = 60;

                            if (choicesArray.length === 4) {
                                // Layout voor 4 antwoorden
                                height = 0.35;
                                const rowSpacing = 0.42;
                                const startY = -0.8;
                                y = startY - (index * rowSpacing);
                            } else { 
                                // Layout voor 2 of 3 antwoorden
                                height = 0.45;
                                const rowSpacing = 0.55;
                                const startY = -0.9;
                                y = startY - (index * rowSpacing);
                            }
                        }

                        btnEntity.setAttribute('position', `0 ${y} 0.02`);
                        
                        let baseColor = (this.gameState.currentScene === 'einde') ? '#f5a623' : '#0b7c58';
                        let hoverColor = (this.gameState.currentScene === 'einde') ? '#f8bf4a' : '#12a06f';

                        plane.setAttribute('width', width);
                        plane.setAttribute('height', height);
                        plane.setAttribute('color', baseColor);
                        plane.setAttribute('animation__hover', `property: color; to: ${hoverColor}; startEvents: mouseenter; dur: 200`);
                        plane.setAttribute('animation__leave', `property: color; to: ${baseColor}; startEvents: mouseleave; dur: 200`);
                        plane.classList.add('clickable');

                        textEl.setAttribute('value', choice.text);
                        textEl.setAttribute('width', width * 0.9);
                        textEl.setAttribute('wrap-count', wrapCount);

                    } else {
                        btnEntity.setAttribute('visible', 'false');
                        plane.classList.remove('clickable'); 
                    }
                });
            }
        });
    </script>
</head>
<body>
    <div id="mode-selector" class="ui-overlay">
        <button id="normalModeBtn" class="btn-ui">Normaal scherm</button>
        <button id="vrModeBtn" class="btn-ui">VR bril / Passthrough</button>
    </div>

    <div id="bg-selector" class="ui-overlay">
        <div class="bg-label">Achtergrond:</div>
        <label class="bg-option">
            <input type="radio" name="bgMode" value="cinema"> 
            Bioscoop (Zwart)
        </label>
        <label class="bg-option">
            <input type="radio" name="bgMode" value="vr" checked> 
            VR (360 graden)
        </label>
        <label class="bg-option" style="margin-bottom: 0;">
            <input type="radio" name="bgMode" value="ar"> 
            AR (Doorzichtig)
        </label>
    </div>
    
    <a-scene kas-experience transparent="true" webxr="optionalFeatures: dom-overlay, hit-test; referenceSpaceType: local-floor" device-orientation-permission-ui="enabled: true">

        <!-- 360 Video Achtergrond -->
        <a-videosphere id="bg-sky" src="#bg-360" rotation="0 -90 0" visible="true"></a-videosphere>
        
        <!-- Bioscoop Zwarte Achtergrond -->
        <a-sky id="bg-black" color="#000000" visible="false"></a-sky>

        <a-assets>
            <video id="bg-360" src="360 graden.mp4" autoplay loop muted playsinline webkit-playsinline crossorigin="anonymous"></video>
            
            <img id="intro-bg" src="startpagina.png" crossorigin="anonymous">

            <img id="img-vraag1" src="plattegrond.png" crossorigin="anonymous">
            <img id="img-vraag1b" src="Fossielvrij.png" crossorigin="anonymous">
            <img id="img-vraag2" src="waterruimte.png" crossorigin="anonymous">
            <img id="img-vraag3" src="fabriek.png" crossorigin="anonymous">
            <img id="img-vraag4" src="bouw.png" crossorigin="anonymous">
            <img id="img-vraag4-heftruck" src="heftruck.png" crossorigin="anonymous">
            <img id="img-vraag4b-vrachtwagen" src="vrachtwagen.png" crossorigin="anonymous">
            <img id="img-vraag5" src="klaar.png" crossorigin="anonymous">

            <video id="actie-video" src="intro.mp4" playsinline webkit-playsinline crossorigin="anonymous"></video>
            <video id="tweede-video" src="tweede.mp4" playsinline webkit-playsinline crossorigin="anonymous"></video>
            <video id="derde-video" src="derde.mp4" playsinline webkit-playsinline crossorigin="anonymous"></video>
            <video id="vierde-video" src="vierde.mp4" playsinline webkit-playsinline crossorigin="anonymous"></video>
            <video id="vijfde-video" src="vijfde.mp4" playsinline webkit-playsinline crossorigin="anonymous"></video>
        </a-assets>

        <a-entity camera look-controls position="0 1.6 0"></a-entity>
        <a-entity cursor="rayOrigin: mouse" raycaster="objects: .clickable"></a-entity>

        <a-entity laser-controls="hand: left" raycaster="objects: .clickable"></a-entity>
        <a-entity laser-controls="hand: right" raycaster="objects: .clickable"></a-entity>

        <a-entity id="ui-container" position="0 1.5 -4.5">
            <a-plane position="0 0.5 -0.05" width="7" height="4.5" color="#000" opacity="0.6" material="shader: flat; transparent: true"></a-plane>
            
            <a-text id="question-text" value="Laden..." align="center"
                    position="0 2.2 0" width="6" wrap-count="55"
                    color="#f5f7fa" line-height="60"></a-text>

            <a-image id="image-display" position="0 0.5 0" visible="false"></a-image>

            <!-- Aangepast naar 16:9 ratio (5 / 2.81) -->
            <a-video id="video-display" position="0 0.4 0" width="5" height="2.81" visible="false"></a-video>

            <a-entity id="choices-container" position="0 0 0">
                
                <a-entity id="btn-0" visible="false">
                    <a-plane id="btn-plane-0" position="0 0 0" material="shader: flat;"></a-plane>
                    <a-text id="btn-text-0" position="0 0 0.01" align="center" color="#FFF"></a-text>
                </a-entity>

                <a-entity id="btn-1" visible="false">
                    <a-plane id="btn-plane-1" position="0 0 0" material="shader: flat;"></a-plane>
                    <a-text id="btn-text-1" position="0 0 0.01" align="center" color="#FFF"></a-text>
                </a-entity>

                <a-entity id="btn-2" visible="false">
                    <a-plane id="btn-plane-2" position="0 0 0" material="shader: flat;"></a-plane>
                    <a-text id="btn-text-2" position="0 0 0.01" align="center" color="#FFF"></a-text>
                </a-entity>

                <a-entity id="btn-3" visible="false">
                    <a-plane id="btn-plane-3" position="0 0 0" material="shader: flat;"></a-plane>
                    <a-text id="btn-text-3" position="0 0 0.01" align="center" color="#FFF"></a-text>
                </a-entity>

            </a-entity>
        </a-entity>

    </a-scene>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const normalBtn = document.getElementById('normalModeBtn');
            const vrBtn = document.getElementById('vrModeBtn');
            const bgRadios = document.getElementsByName('bgMode');
            const skyEl = document.getElementById('bg-sky');
            const blackEl = document.getElementById('bg-black');

            if (!normalBtn || !vrBtn) return;

            normalBtn.classList.add('active');

            // Achtergrond selector logica (Bioscoop / VR / AR)
            bgRadios.forEach(radio => {
                radio.addEventListener('change', (e) => {
                    const mode = e.target.value;
                    if (mode === 'vr') {
                        skyEl.setAttribute('visible', 'true');
                        blackEl.setAttribute('visible', 'false');
                    } else if (mode === 'cinema') {
                        skyEl.setAttribute('visible', 'false');
                        blackEl.setAttribute('visible', 'true');
                    } else { // AR (Doorzichtig)
                        skyEl.setAttribute('visible', 'false');
                        blackEl.setAttribute('visible', 'false');
                    }
                });
            });

            normalBtn.addEventListener('click', function () {
                const sceneEl = document.querySelector('a-scene');
                if (sceneEl && sceneEl.is && sceneEl.is('vr-mode')) {
                    sceneEl.exitVR();
                }
                normalBtn.classList.add('active');
                vrBtn.classList.remove('active');
            });

            vrBtn.addEventListener('click', function () {
                const sceneEl = document.querySelector('a-scene');
                if (sceneEl && sceneEl.hasLoaded) {
                     if (sceneEl.is('ar-mode')) {
                         sceneEl.enterVR(); 
                     } else {
                         sceneEl.systems.webxr.sessionReferenceSpaceType = 'local-floor';
                         sceneEl.enterAR(); 
                     }
                }
                normalBtn.classList.remove('active');
                vrBtn.classList.add('active');
            });
            
            const sceneEl = document.querySelector('a-scene');
            sceneEl.addEventListener('enter-vr', function () {
                normalBtn.classList.remove('active');
                vrBtn.classList.add('active');
            });
            sceneEl.addEventListener('exit-vr', function () {
                normalBtn.classList.add('active');
                vrBtn.classList.remove('active');
            });
        });
    </script>
</body>
</html>
